# Decap CMS config.
# Auth: Netlify Identity is discontinued for new projects, so this uses the
# "github" backend instead — login happens via a GitHub OAuth App you create,
# with Netlify acting as the OAuth handshake proxy (Project configuration ->
# OAuth, not Identity). See NEXT-STEPS.md for the exact one-time setup.
#
# Content is plain JSON files under content/ (no build step — the pages fetch
# these directly at runtime via js/render-*.js). That's why every file/gallery
# entry below sets format: json and why "gallery" is one file with a repeating
# list field instead of a folder collection: a folder of many small files can't
# be listed by a browser without a server, so everything that needs to be
# addable/reorderable from the CMS lives as a list inside a single JSON file.

backend:
  name: github
  repo: brichoward-spec/Portfolio
  branch: main

media_folder: "img/uploads"
public_folder: "/img/uploads"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - name: "home"
        label: "Home (Landing)"
        file: "content/home.json"
        format: "json"
        fields:
          - { name: "tagline", label: "Tagline", widget: "string" }
          - { name: "professional_desc", label: "Professional door description", widget: "text" }
          - { name: "creative_desc", label: "Creative door description", widget: "text" }

      - name: "professional"
        label: "Professional Page"
        file: "content/professional.json"
        format: "json"
        fields:
          - { name: "eyebrow", label: "Eyebrow", widget: "string" }
          - { name: "name", label: "Name", widget: "string" }
          - { name: "profile", label: "Profile blurb", widget: "text" }
          - name: "contact"
            label: "Contact info"
            widget: "object"
            fields:
              - { name: "phone", label: "Phone", widget: "string" }
              - { name: "email", label: "Email", widget: "string" }
              - { name: "linkedin", label: "LinkedIn URL", widget: "string" }
              - { name: "location", label: "Location", widget: "string" }
          - { name: "resume_file", label: "Resume PDF", widget: "file" }
          - name: "experience"
            label: "Experience"
            widget: "list"
            fields:
              - { name: "title", label: "Job title", widget: "string" }
              - { name: "org", label: "Organization", widget: "string" }
              - { name: "dates", label: "Dates", widget: "string" }
              - { name: "description", label: "Description", widget: "text" }
          - name: "earlier_experience"
            label: "Earlier Experience"
            widget: "list"
            fields:
              - { name: "title", label: "Title", widget: "string" }
              - { name: "org", label: "Organization", widget: "string" }
              - { name: "dates", label: "Dates", widget: "string" }
          - name: "skills"
            label: "Skills"
            widget: "list"
            field: { name: "skill", label: "Skill", widget: "string" }
          - name: "education"
            label: "Education"
            widget: "list"
            fields:
              - { name: "school", label: "School", widget: "string" }
              - { name: "degree", label: "Degree", widget: "string" }
          - { name: "contact_heading", label: "Contact section heading", widget: "string" }
          - { name: "contact_sub", label: "Contact section subtext", widget: "text" }

      - name: "about"
        label: "About Page"
        file: "content/about.json"
        format: "json"
        fields:
          - { name: "headshot", label: "Headshot", widget: "image" }
          - name: "bio"
            label: "Bio paragraphs"
            widget: "list"
            field: { name: "bio", label: "Paragraph", widget: "text" }
          - name: "fur_family"
            label: "Fur Family"
            widget: "list"
            fields:
              - { name: "name", label: "Name", widget: "string" }
              - { name: "group", label: "Group label (e.g. \"Frank\", \"My girls\", \"Ones I've lost\") — pets sharing a group label are shown together", widget: "string" }
              - { name: "photo", label: "Photo", widget: "image" }
              - { name: "remembered", label: "In memoriam (shown at reduced opacity)", widget: "boolean", default: false }
          - { name: "contact_heading", label: "Contact section heading (use **double asterisks** for the pink-accented part)", widget: "string" }
          - { name: "contact_sub", label: "Contact section subtext", widget: "text" }

      - name: "portfolio"
        label: "Creative Home Page"
        file: "content/portfolio.json"
        format: "json"
        fields:
          - { name: "eyebrow", label: "Hero eyebrow", widget: "string" }
          - { name: "h1", label: "Hero headline (use **double asterisks** for the pink-accented part)", widget: "text" }
          - { name: "sub", label: "Hero subtext", widget: "text" }
          - { name: "approach_heading", label: "Approach heading", widget: "string" }
          - { name: "pull_quote", label: "Pull quote (sits under gallery)", widget: "string" }
          - name: "materials"
            label: "Materials"
            widget: "list"
            fields:
              - { name: "name", label: "Material name", widget: "string" }
              - { name: "count", label: "Piece count", widget: "number" }
          - name: "tools"
            label: "Digital tools"
            widget: "list"
            field: { name: "tool", label: "Tool name", widget: "string" }
          - { name: "contact_heading", label: "Contact section heading (use **double asterisks** for the pink-accented part)", widget: "string" }
          - { name: "contact_sub", label: "Contact section subtext", widget: "text" }

      - name: "gallery"
        label: "Gallery / Artwork"
        file: "content/gallery.json"
        format: "json"
        fields:
          - name: "items"
            label: "Pieces"
            widget: "list"
            fields:
              - { name: "title", label: "Title", widget: "string" }
              - { name: "image", label: "Image", widget: "image" }
              - { name: "tag", label: "Tag / category label", widget: "string" }
              - name: "color"
                label: "Tag accent color"
                widget: "select"
                options: ["glow1", "glow2", "glow3", "glow4", "glow5", "glow6"]
                default: "glow1"
